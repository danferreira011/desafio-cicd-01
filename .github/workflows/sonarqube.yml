name: SonarQube
on:
#   push:
#     branches:
#       - master
#   pull_request:
#     types: [opened, synchronize, reopened]
    workflow_call: 
jobs:
  build:
    name: SonarQube Scan
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
           ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"dan-teste_sonar" /o:"dan-teste" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
           dotnet build ./src/Review-Filmes.sln
           ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Debug Token
        shell: bash
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
            if [ -z "$SONAR_TOKEN" ]; then
                echo "TOKEN VAZIO"
                exit 1
            else
                echo "TOKEN OK"
            fi

      - name: Verificação de Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        id: sonarqube-quality-gate-check
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
            #scanMetadataReportFile: ./src/.sonarqube/out/.sonar/report-task.txt
            scanMetadataReportFile: .sonarqube/out/.sonar/report-task.txt

      - name: Exibir Quality Gates
        if: ${{always()}}
        run: 'echo "Status do Quality Gate: ${{steps.sonarqube-quality-gate-check.outputs.quality-gate-status}}"'