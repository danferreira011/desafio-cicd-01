name: Pipeline CI/CD
run-name: Pipeline CI/CD executada por ${{ github.actor}} numero ${{github.run_number}}
on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  security-events: write
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Obterndo Código
        uses: actions/checkout@v4

      - name: Analise do Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./src/Review-Filmes.Web/Dockerfile
        
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.300"

      - name: Execução do Comando build
        working-directory: ./src
        run: |
          dotnet build ./Review-Filmes.sln

  testes:
    needs: [build]
    uses: danferreira011/desafio-cicd-01/.github/workflows/testes.yml@main 
    secrets: inherit

  release:
    name: Criação de Release
    runs-on: ubuntu-latest
    needs: [testes]
    steps:
      - name: Obterndo Código
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKERHUB_USER}}
          password: ${{secrets.DOCKERHUB_PWD}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./src
          file: ./src/Review-Filmes.Web/Dockerfile
          tags: |
            ${{vars.DOCKERHUB_USER}}/projeto-devops-pro:latest
            ${{vars.DOCKERHUB_USER}}/projeto-devops-pro:v${{github.run_number}}

      - name: Executar Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          image-ref: ${{vars.DOCKERHUB_USER}}/projeto-devops-pro:v${{github.run_number}}
          format: sarif
          output: trivy-docker-result.sarif
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Upload do arquivo trivy para o github
        uses: github/codeql-action/upload-sarif@v3
        with:
          category: docker-result
          sarif_file: trivy-docker-result.sarif