name: Pipeline CI/CD
run-name: Pipeline CI/CD executada por ${{ github.actor}} numero ${{github.run_number}}
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Obterndo Código
        uses: actions/checkout@v4
        
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.300"

      - name: Execução do Comando build
        working-directory: ./src
        run: |
          dotnet build ./Review-Filmes.sln

  testes:
    needs: [build]
    uses: danferreira011/desafio-cicd-01/.github/workflows/testes.yml@main

  release:
    name: Criação de Release
    runs-on: ubuntu-latest
    needs: [testes]
    steps:
      - name: Obterndo Código
        uses: actions/checkout@v6.0.2

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKERHUB_USER}}
          password: ${{secrets.DOCKERHUB_PWD}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./src
          file: ./src/Review-Filmes.Web/Dockerfile
          tags: |
            ${{vars.DOCKERHUB_USER}}/projeto-devops-pro:latest
            ${{vars.DOCKERHUB_USER}}/projeto-devops-pro:v${{github.run_number}}